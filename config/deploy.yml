service: job_agent_app
image: reckerswartz/job_agent_app

servers:
  web:
    hosts:
      - 192.168.0.1
    options:
      memory: 1g
  job:
    hosts:
      - 192.168.0.1
    cmd: bin/jobs
    options:
      memory: 512m

proxy:
  ssl: true
  host: app.jobagent.dev

registry:
  server: ghcr.io
  username: reckerswartz
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
    - NVIDIA_API_KEY
  clear:
    SOLID_QUEUE_IN_PUMA: false
    DB_HOST: job_agent_app-db
    REDIS_URL: redis://job_agent_app-redis:6379/0
    ACTION_CABLE_URL: redis://job_agent_app-redis:6379/1
    RAILS_LOG_LEVEL: info
    WEB_CONCURRENCY: 2
    JOB_CONCURRENCY: 3

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

volumes:
  - "job_agent_app_storage:/rails/storage"

asset_path: /rails/public/assets

builder:
  arch: amd64

accessories:
  db:
    image: postgres:17
    host: 192.168.0.1
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_DB: job_agent_app_production
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
  redis:
    image: valkey/valkey:8
    host: 192.168.0.1
    port: "127.0.0.1:6379:6379"
    directories:
      - data:/data
